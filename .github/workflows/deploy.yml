name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-slr-membership-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Create .env file from GitHub Secret
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "" >> .env
          echo "REGISTRY=${{ env.REGISTRY }}" >> .env
          echo "IMAGE_NAME=${{ env.IMAGE_NAME }}" >> .env

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy files to VPS
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ~/frontend/slr-membership"
          scp -P ${{ secrets.SSH_PORT || 22 }} .env docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/frontend/slr-membership/

      - name: Deploy container via SSH
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "bash -s" <<EOF
            # Login to ghcr.io on VPS
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Go to working directory
            cd ~/frontend/slr-membership

            # Pull latest image and recreate container
            docker compose pull
            docker compose up -d

            # Verify container is running
            sleep 3
            if docker ps --filter "name=slr-membership" --filter "status=running" -q | grep -q .; then
              echo "✅ Container is running successfully"
            else
              echo "❌ Container failed to start. Logs:"
              docker compose logs
              exit 1
            fi

            # Clean up old images
            docker image prune -af
          EOF

  cleanup-registry:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Delete old images from ghcr.io
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
